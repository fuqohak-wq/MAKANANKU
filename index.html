<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Nutrition Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-900 dark:text-slate-100 font-sans min-h-screen transition-colors duration-300">

    <nav class="bg-white dark:bg-slate-800 shadow-md py-4 px-6 mb-8 border-b border-slate-200 dark:border-slate-700 sticky top-0 z-40">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-wide flex items-center gap-2 text-blue-600 dark:text-blue-400">
                <i class="fa-solid fa-heart-pulse text-amber-500 animate-pulse"></i> AI Nutrition
            </h1>
            <div class="flex items-center gap-4">
                <button onclick="toggleDarkMode()" class="p-2 rounded-full bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-amber-400">
                    <i id="themeIcon" class="fa-solid fa-moon"></i>
                </button>
                <span class="hidden md:inline text-xs bg-blue-500/10 dark:bg-blue-500/20 px-3 py-1 rounded-full text-blue-600 dark:text-blue-300 border border-blue-500/30">v1.5 Premium</span>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 pb-12">
        <script>
            // GANTI DENGAN URL WEB APP ANDA
            const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxyR-YR6cfWMYrvgZsavVqWCZVDh_FFIdyDDTWWIzM4SxibMkDAdNlOaA2T3pCa1SpA/exec"; 
        </script>

        <section class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-700 p-6 mb-8">
            <h2 class="text-lg font-bold mb-2 flex items-center gap-2 text-slate-800 dark:text-slate-200">
                <i class="fa-solid fa-utensils text-blue-500"></i> Catat Makanan
            </h2>
            <p class="text-sm text-slate-500 dark:text-slate-400 mb-4">Tulis deskripsi atau unggah foto makanan Anda untuk dianalisis otomatis.</p>
            
            <form id="nutritionForm" class="space-y-4">
                <!-- Preview Image Area -->
                <div id="imagePreviewContainer" class="hidden relative w-full h-48 bg-slate-100 dark:bg-slate-950 rounded-xl overflow-hidden border-2 border-dashed border-slate-300 dark:border-slate-700">
                    <img id="imagePreview" src="" class="w-full h-full object-contain">
                    <button type="button" onclick="removeImage()" class="absolute top-2 right-2 bg-red-500 text-white p-2 rounded-full hover:bg-red-600 transition">
                        <i class="fa-solid fa-trash-can"></i>
                    </button>
                </div>

                <textarea 
                    id="foodInput" 
                    rows="2" 
                    class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-950 border border-slate-300 dark:border-slate-700 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 dark:text-slate-200 placeholder-slate-400"
                    placeholder="Contoh: Nasi padang pake rendang..."></textarea>
                
                <div class="grid grid-cols-2 gap-3">
                    <button type="button" onclick="document.getElementById('fileInput').click()" 
                        class="flex items-center justify-center gap-2 bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 py-3 rounded-xl transition font-medium">
                        <i class="fa-solid fa-camera"></i> Foto / Galeri
                    </button>
                    <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="previewFile()">
                    
                    <button type="submit" id="btnSubmit"
                        class="bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 rounded-xl transition flex items-center justify-center gap-2 shadow-lg shadow-blue-900/20">
                        <i class="fa-solid fa-wand-magic-sparkles"></i> Analisis AI
                    </button>
                </div>
            </form>
        </section>

        <!-- Dashboard Summary (Tetap sama dengan desain Anda) -->
        <section class="mb-8">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2">
                <i class="fa-solid fa-chart-pie text-blue-500"></i> Nutrisi Hari Ini
            </h2>
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4" id="dashboardGrid">
                <!-- Skeleton Loading -->
                <div class="bg-white dark:bg-slate-800 p-4 rounded-xl border border-slate-200 dark:border-slate-700 animate-pulse h-24"></div>
                <div class="bg-white dark:bg-slate-800 p-4 rounded-xl border border-slate-200 dark:border-slate-700 animate-pulse h-24"></div>
                <div class="bg-white dark:bg-slate-800 p-4 rounded-xl border border-slate-200 dark:border-slate-700 animate-pulse h-24"></div>
                <div class="bg-white dark:bg-slate-800 p-4 rounded-xl border border-slate-200 dark:border-slate-700 animate-pulse h-24"></div>
                <div class="bg-white dark:bg-slate-800 p-4 rounded-xl border border-slate-200 dark:border-slate-700 animate-pulse h-24"></div>
                <div class="bg-white dark:bg-slate-800 p-4 rounded-xl border border-slate-200 dark:border-slate-700 animate-pulse h-24"></div>
            </div>
        </section>

        <!-- Tabel Riwayat (Disederhanakan untuk responsive) -->
        <section class="bg-white dark:bg-slate-800 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-700 overflow-hidden">
            <div class="p-6 border-b border-slate-200 dark:border-slate-700 flex justify-between items-center text-slate-800 dark:text-white">
                <h2 class="text-lg font-bold flex items-center gap-2">
                    <i class="fa-solid fa-clock-rotate-left text-blue-500"></i> Riwayat Terakhir
                </h2>
                <button onclick="fetchData()" class="text-blue-500 hover:text-blue-400 text-sm font-medium">
                    <i class="fa-solid fa-rotate"></i>
                </button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 dark:bg-slate-900/50 text-slate-500 text-xs uppercase font-semibold border-b border-slate-200 dark:border-slate-700">
                            <th class="py-3 px-6">Waktu/Makanan</th>
                            <th class="py-3 px-6 text-right">Kal</th>
                            <th class="py-3 px-6 text-right">Prot</th>
                            <th class="py-3 px-6 text-right">Lemak</th>
                        </tr>
                    </thead>
                    <tbody id="riwayatTableBody" class="divide-y divide-slate-200 dark:divide-slate-700 text-sm">
                        <tr><td colspan="4" class="text-center py-8">Memuat data...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Modal (Sama seperti sebelumnya dengan dark mode support) -->
    <div id="nutritionModal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-950 w-full max-w-lg rounded-3xl border border-slate-200 dark:border-slate-800 shadow-2xl p-6 text-center overflow-y-auto max-h-[90vh]">
            <div class="text-amber-500 text-3xl mb-2 flex justify-center"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
            <h3 class="text-xl font-bold mb-1">Hasil Analisis AI</h3>
            <div id="modalFoodTitle" class="text-amber-600 dark:text-amber-400 font-bold uppercase text-sm tracking-wide mb-6">NAMA MAKANAN</div>
            
            <div class="grid grid-cols-5 gap-2 mb-6">
                <div class="bg-slate-100 dark:bg-slate-900/60 p-2 rounded-xl border border-slate-200 dark:border-slate-800">
                    <div class="text-[10px] uppercase font-semibold text-slate-500">Kalori</div>
                    <div id="popKalori" class="text-xs font-bold text-blue-600 dark:text-blue-400">0</div>
                </div>
                <div class="bg-slate-100 dark:bg-slate-900/60 p-2 rounded-xl border border-slate-200 dark:border-slate-800">
                    <div class="text-[10px] uppercase font-semibold text-slate-500">Prot</div>
                    <div id="popProtein" class="text-xs font-bold text-emerald-600 dark:text-emerald-400">0</div>
                </div>
                <div class="bg-slate-100 dark:bg-slate-900/60 p-2 rounded-xl border border-slate-200 dark:border-slate-800">
                    <div class="text-[10px] uppercase font-semibold text-slate-500">Karbo</div>
                    <div id="popKarbo" class="text-xs font-bold text-amber-600 dark:text-amber-500">0</div>
                </div>
                <div class="bg-slate-100 dark:bg-slate-900/60 p-2 rounded-xl border border-slate-200 dark:border-slate-800">
                    <div class="text-[10px] uppercase font-semibold text-slate-500">Lemak</div>
                    <div id="popLemak" class="text-xs font-bold text-rose-600 dark:text-rose-400">0</div>
                </div>
                <div class="bg-slate-100 dark:bg-slate-900/60 p-2 rounded-xl border border-slate-200 dark:border-slate-800">
                    <div class="text-[10px] uppercase font-semibold text-slate-500">Serat</div>
                    <div id="popSerat" class="text-xs font-bold text-green-600 dark:text-green-400">0</div>
                </div>
            </div>

            <div class="text-left mb-6">
                <div class="bg-slate-50 dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl p-4 text-sm leading-relaxed" id="modalConclusion"></div>
            </div>

            <div class="space-y-2">
                <button id="btnConfirmSave" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3.5 px-6 rounded-xl transition flex items-center justify-center gap-2 uppercase tracking-wider text-sm shadow-lg">Simpan ke Jurnal</button>
                <button onclick="closeModal()" class="w-full bg-slate-100 dark:bg-slate-900 text-slate-500 py-3 px-6 rounded-xl transition uppercase text-xs">Batal</button>
            </div>
        </div>
    </div>

    <script>
        let temporaryAiData = null;
        let currentRawInput = "";
        let base64Image = null;

        // Dark Mode Logic
        function toggleDarkMode() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icon.classList.replace('fa-moon', 'fa-sun');
                localStorage.theme = 'light';
            } else {
                html.classList.add('dark');
                icon.classList.replace('fa-sun', 'fa-moon');
                localStorage.theme = 'dark';
            }
        }

        // Preview File
        function previewFile() {
            const file = document.getElementById('fileInput').files[0];
            const reader = new FileReader();
            reader.onloadend = function() {
                base64Image = reader.result.split(',')[1];
                document.getElementById('imagePreview').src = reader.result;
                document.getElementById('imagePreviewContainer').classList.remove('hidden');
            }
            if (file) reader.readAsDataURL(file);
        }

        function removeImage() {
            base64Image = null;
            document.getElementById('fileInput').value = "";
            document.getElementById('imagePreviewContainer').classList.add('hidden');
        }

        // Fetch Data
        async function fetchData() {
            try {
                const res = await fetch(GAS_WEB_APP_URL);
                const result = await res.json();
                if (result.status === "success") {
                    renderDashboard(result.dashboard);
                    renderRiwayat(result.riwayat);
                }
            } catch (error) { console.error("Error:", error); }
        }

        // Submit Analysis
        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const textInput = document.getElementById("foodInput").value.trim();
            if(!textInput && !base64Image) return alert("Berikan teks atau foto makanan!");

            btnSubmit.disabled = true;
            btnSubmit.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> Menganalisis...`;

            try {
                const res = await fetch(GAS_WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify({ 
                        action: "analyze", 
                        input: textInput,
                        image: base64Image 
                    }),
                    headers: { 'Content-Type': 'text/plain' }
                });
                
                const responseData = await res.json();
                if(responseData.status === "success") {
                    temporaryAiData = responseData.data;
                    currentRawInput = textInput || "Analisis via Foto";
                    openModal(temporaryAiData);
                } else { alert(responseData.message); }
            } catch (error) { alert("Koneksi gagal."); }
            finally {
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = `<i class="fa-solid fa-wand-magic-sparkles"></i> Analisis AI`;
            }
        });

        function openModal(data) {
            document.getElementById("modalFoodTitle").innerText = data.nama_makanan || "Menu";
            document.getElementById("popKalori").innerText = data.kalori_kkal || 0;
            document.getElementById("popProtein").innerText = (data.protein_g || 0) + "g";
            document.getElementById("popKarbo").innerText = (data.karbohidrat_g || 0) + "g";
            document.getElementById("popLemak").innerText = (data.lemak_total_g || 0) + "g";
            document.getElementById("popSerat").innerText = (data.serat || 0) + "g";
            document.getElementById("modalConclusion").innerHTML = data.catatan_ai || "Berhasil dianalisis.";
            document.getElementById("nutritionModal").classList.remove("hidden");
        }

        function closeModal() {
            document.getElementById("nutritionModal").classList.add("hidden");
            removeImage();
            document.getElementById("foodInput").value = "";
        }

        // Save Data (Tetap sama dengan logika Anda)
        document.getElementById("btnConfirmSave").addEventListener("click", async () => {
            const btn = document.getElementById("btnConfirmSave");
            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> Menyimpan...`;
            try {
                const res = await fetch(GAS_WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "save", data: temporaryAiData, originalInput: currentRawInput }),
                    headers: { 'Content-Type': 'text/plain' }
                });
                if((await res.json()).status === "success") {
                    closeModal();
                    fetchData();
                    alert("Berhasil dicatat!");
                }
            } catch (e) { alert("Gagal menyimpan."); }
            finally { btn.disabled = false; btn.innerHTML = "Simpan ke Jurnal"; }
        });

        function renderDashboard(db) {
            const metrics = [
                { title: "Kalori", value: db.kalori_hari_ini || 0, unit: "kkal", icon: "fa-fire", color: "text-orange-500" },
                { title: "Protein", value: db.protein || 0, unit: "g", icon: "fa-egg", color: "text-red-400" },
                { title: "Karbohidrat", value: db.karbohidrat || 0, unit: "g", icon: "fa-wheat-awn", color: "text-amber-500" },
                { title: "Lemak", value: db.lemak || 0, unit: "g", icon: "fa-droplet", color: "text-yellow-400" },
                { title: "Serat", value: db.serat || 0, unit: "g", icon: "fa-seedling", color: "text-green-400" },
                { title: "Air", value: db.air || 0, unit: "ml", icon: "fa-glass-water", color: "text-blue-400" }
            ];
            document.getElementById("dashboardGrid").innerHTML = metrics.map(m => `
                <div class="bg-white dark:bg-slate-800 p-4 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm flex flex-col justify-between">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[10px] font-bold text-slate-400 uppercase">${m.title}</span>
                        <i class="fa-solid ${m.icon} ${m.color}"></i>
                    </div>
                    <div>
                        <span class="text-xl font-black">${m.value}</span>
                        <span class="text-[10px] text-slate-400">${m.unit}</span>
                    </div>
                </div>
            `).join('');
        }

        function renderRiwayat(riwayat) {
            const tbody = document.getElementById("riwayatTableBody");
            if (!riwayat || riwayat.length === 0) {
                tbody.innerHTML = `<tr><td colspan="4" class="text-center py-6 text-slate-500">Kosong.</td></tr>`;
                return;
            }
            tbody.innerHTML = riwayat.map(item => `
                <tr class="hover:bg-slate-50 dark:hover:bg-slate-700/50 transition">
                    <td class="py-3 px-6">
                        <div class="text-[10px] text-slate-400">${item["Jam"] || '-'}</div>
                        <div class="font-semibold text-slate-700 dark:text-slate-200">${item["Nama Makanan"] || '-'}</div>
                    </td>
                    <td class="py-3 px-6 text-right font-bold text-orange-500">${item["Kalori (kkal)"] || 0}</td>
                    <td class="py-3 px-6 text-right text-emerald-500 font-medium">${item["Protein (g)"] || 0}g</td>
                    <td class="py-3 px-6 text-right text-rose-400">${item["Lemak Total (g)"] || 0}g</td>
                </tr>
            `).join('');
        }

        // Set initial theme
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            document.getElementById('themeIcon').classList.replace('fa-sun', 'fa-moon');
        } else {
            document.documentElement.classList.remove('dark');
            document.getElementById('themeIcon').classList.replace('fa-moon', 'fa-sun');
        }

        document.addEventListener("DOMContentLoaded", fetchData);
    </script>
</body>
</html>
