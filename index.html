<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asisten Motivasi Kocak AI</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214;
            color: #e1e1e6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 650px;
            width: 100%;
            background: #1a1a1e;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #29292e;
        }
        h1 {
            font-size: 24px;
            text-align: center;
            color: #ff5722;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #a8a8b3;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .status-box {
            background: #202024;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            border-left: 4px solid #ff5722;
        }
        .status-item {
            margin: 5px 0;
        }
        .status-label {
            font-weight: bold;
            color: #ff9800;
        }
        .nasehat-box {
            background: #29292e;
            padding: 20px;
            border-radius: 8px;
            line-height: 1.6;
            font-size: 16px;
            min-height: 150px;
            white-space: pre-line;
            border: 1px dashed #444;
        }
        .btn-container {
            display: flex;
            justify-content: center;
            margin-top: 25px;
        }
        button {
            background-color: #ff5722;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(255, 87, 34, 0.4);
        }
        button:hover {
            transform: translateY(-2px);
            background-color: #e04d1d;
        }
        button:disabled {
            background-color: #555;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .loading {
            text-align: center;
            color: #a8a8b3;
            font-style: italic;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🚀 Bos Motivasi AI Kocak</h1>
    <div class="subtitle">Sistem Pemantau Rutinitas & Mood Otomatis Berbasis AI</div>
    <div class="status-box">
        <div class="status-item"><span class="status-label">🕒 Waktu Sekarang:</span> <span id="jam-sekarang">Memuat...</span></div>
        <div class="status-item"><span class="status-label">📅 Jadwal Mestinya:</span> <span id="jadwal-mestinya">Memuat...</span></div>
        <div class="status-item"><span class="status-label">🎭 Status Mood (C10):</span> <span id="mood-c10">Memuat...</span></div>
        <div class="status-item"><span class="status-label">📝 Catatan Esensial (A11):</span> <span id="mood-a11">Memuat...</span></div>
    </div>
    <div class="nasehat-box" id="nasehat-container">
        <div class="loading">Klik tombol di bawah untuk mendengarkan petuah AI yang membagongkan namun penuh makna...</div>
    </div>
    <div class="btn-container">
        <button id="btn-get" onclick="ambilNasehat()">Ambil Nasehat Sekarang!</button>
    </div>
</div>
<script>
    // 🌟 GANTI URL DI BAWAH INI DENGAN URL WEB APP HASIL DEPLOY GOOGLE APPS SCRIPT ANDA 🌟
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzUg2PbvCWboeldk3_cgcDDfMHP7BbtXVvPVzpbKMZkDwUCIdNVqXXX6Oj1KvkxnEIJvw/exec";

    async function ambilNasehat() {
        const btn = document.getElementById('btn-get');
        const container = document.getElementById('nasehat-container');
        if(WEB_APP_URL === "URL_WEB_APP_GOOGLE_APPS_SCRIPT_ANDA") {
            container.innerHTML = "<span style='color: #ff4444;'>[Error] Anda belum memasukkan URL Web App hasil deploy Google Apps Script ke variabel <b>WEB_APP_URL</b> di dalam file HTML!</span>";
            return;
        }
        btn.disabled = true;
        container.innerHTML = "<div class='loading'>Menghubungi batin AI... Tunggu sebentar, AI lagi ngeracik petuah bermakna buat kamu...</div>";
        try {
            const response = await fetch(WEB_APP_URL);
            const data = await response.json();
            if (data.success) {
                document.getElementById('jam-sekarang').innerText = data.jamSekarang;
                document.getElementById('jadwal-mestinya').innerText = data.kegiatanMestinya;
                document.getElementById('mood-c10').innerText = data.moodC10;
                document.getElementById('mood-a11').innerText = data.moodA11;
                container.innerText = data.nasehat;
            } else {
                container.innerHTML = "<span style='color: #ff4444;'>Gagal mengambil data dari Script: " + data.error + "</span>";
            }
        } catch (error) {
            container.innerHTML = "<span style='color: #ff4444;'>Terjadi kesalahan jaringan. Pastikan script Anda sudah di-deploy dengan opsi akses 'Anyone'.<br><br>Detail: " + error + "</span>";
        } finally {
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
